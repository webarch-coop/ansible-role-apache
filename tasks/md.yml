---
- name: Apache mod_md tasks
  block:

    - name: Include mod_md install tasks
      ansible.builtin.include_tasks: md_install.yml
      when:
        - apache_md_version is defined
        - apache_md_version != "default"
      tags:
        - apache_install

    - name: Include Apache mod_md cert copy tasks
      ansible.builtin.include_tasks: md_cert_cp.yml
      loop: "{{ apache_md_cert_copy }}"
      loop_control:
        loop_var: apache_md_cert_cp
        label: "{{ apache_md_cert_cp.name }}"
      when:
        - apache_md_cert_copy is defined
        - apache_md_cert_copy != []
        - apache_md_cert_cp.pkgs | ansible.builtin.difference(ansible_facts.packages.keys()) == []

    - name: Apache reload script in place
      ansible.builtin.template:
        src: apache_md_cert_reload.sh.j2
        dest: /usr/local/bin/apache_md_cert_reload.sh
        owner: root
        group: root
        mode: "0750"

    - name: Stat the Apache reload script path
      ansible.builtin.stat:
        path: /usr/local/bin/apache_md_cert_reload.sh
      register: apache_md_cert_reload_path

    - name: Check loaded Apache modules
      block:

        - name: Register the loaded Apache modules
          ansible.builtin.command:
            cmd: a2query -m
          check_mode: false
          changed_when: false
          register: apache_modules_check

      rescue:

        - name: No mods enabled
          ansible.builtin.set_fact:
            apache_modules_loaded: []
          when: ("No module matches" in apache_modules_check.stderr)


    - name: Set an array of loaded Apache modules
      block:

        - name: Debug the loaded modules
          ansible.builtin.debug:
            var: apache_modules_check.stdout_lines
            verbosity: 3
          tags:
            - debug

        - name: Set an array of the loaded modules
          ansible.builtin.set_fact:
            apache_modules_loaded: >-
              {{- apache_modules_check.stdout_lines | map('ansible.builtin.regex_replace', '[ ].*$') | sort -}}

      when:
        - apache_modules_check.stdout is defined
        - apache_modules_check.stderr | length == 0

    - name: Debug loaded modules
      ansible.builtin.debug:
        var: apache_modules_loaded
        verbosity: 3
      tags:
        - debug

    - name: Apavche reload script checked and cron job in place
      block:

        - name: Check the Apache reload script
          ansible.builtin.command:
            cmd: /usr/local/bin/apache_md_cert_reload.sh
          check_mode: false
          changed_when: false

        - name: Crontab for Apache reload script in place
          ansible.builtin.cron:
            name: "Apache mod_md certificate reload"
            special_time: daily
            job: /usr/local/bin/apache_md_cert_reload.sh

      when:
        - ("md" in apache_modules_loaded)
        - apache_md_cert_reload_path.stat.exists | ansible.builtin.bool

  when: apache_md_version != "default"
  tags:
    - apache
...
