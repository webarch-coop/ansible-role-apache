---
- name: File absent
  block:

    - name: Debug apache_file_absent
      ansible.builtin.debug:
        var: apache_file_absent
        verbosity: "{% if ansible_check_mode | bool or ansible_diff_mode | bool %}0{% else %}1{% endif %}"
      tags:
        - debug

    - name: "Stat {{ apache_file_absent }}"
      ansible.builtin.stat:
        path: "{{ apache_file_absent }}"
      register: apache_file_absent_path

    - name: "Backup and remove {{ apache_file_absent }}"
      ansible.builtin.command:
        cmd: >-
          mv
          {{ apache_file_absent }}
          {{ apache_file_backup }}
      args:
        removes: "{{ apache_file_absent }}"
        creates: "{{ apache_file_backup }}"
      vars:
        apache_file_backup: "{{ apache_file_absent | ansible.builtin.dirname }}/.{{ apache_file_absent | ansible.builtin.basename }}.{{ ansible_facts.date_time.iso8601_basic_short }}.ansible.save"
      register: apache_file_path_absent
      when: apache_file_absent_path.stat.exists | bool

  tags:
    - apache
...
