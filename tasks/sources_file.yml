---
- name: Read the Apache repository sources file
  block:

    - name: Slurp /etc/apt/sources.list.d/apache.sources
      ansible.builtin.slurp:
        src: /etc/apt/sources.list.d/apache.sources
      register: apache_sources_contents_b64encoded

    - name: Decode the base64 encoded version of /etc/apt/sources.list.d/apache.sources
      ansible.builtin.set_fact:
        apache_sources_contents: "{{ apache_sources_contents_b64encoded['content'] | ansible.builtin.b64decode | community.general.jc('ini') }}"

    - name: Print the contents of /etc/apt/sources.list.d/apache.sources
      ansible.builtin.debug:
        var: apache_sources_contents
        verbosity: "{% if ansible_check_mode | bool %}0{% else %}1{% endif %}"
      tags:
        - debug

  when: apache_sources_path.stat.exists | bool
  tags:
    - apache
    - apache_apt
...
