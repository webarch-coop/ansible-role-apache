---
ansible_managed: Ansible managed

# https://docs.ansible.com/ansible/latest/playbook_guide/complex_data_manipulation.html
apachevarnames: "{{ q('varnames', '^apache_') | sort }}"
apachehostvars: "{{ dict(apachevarnames | list | zip(q('vars', *apachevarnames))) }}"

apache_github_gpg_url: https://github.com/web-flow.gpg
apache_github_gpg_checksum: sha256:6e8af687f60cf3f403151c8fb1b26e95e6f9e424ca60cc8f3787bd4466a3ef84

# Distro backports string
apache_apt_backports: "{{ ansible_facts.distribution_release }}-backports"

# JMESPath queries
apache_jpq:
  pkgs_absent: "[?name=='{{ ansible_facts.distribution_release }}'].pkgs_absent|[0]"
  pkgs_absent_backports: "[?name=='{{ ansible_facts.distribution_release }}'].pkgs_absent_backports|[0]"
  pkgs_absent_sury: "[?name=='{{ ansible_facts.distribution_release }}'].pkgs_absent_sury|[0]"
  pkgs_present: "[?name=='{{ ansible_facts.distribution_release }}'].pkgs_present|[0]"
  pkgs_present_backports: "[?name=='{{ ansible_facts.distribution_release }}'].pkgs_present_backports|[0]"
  pkgs_present_sury: "[?name=='{{ ansible_facts.distribution_release }}'].pkgs_present_sury|[0]"

# Apt packages
apache_empty_list: []
apache_sury_pkg_absent: >-
  {%- if apache_pkgs | community.general.json_query(apache_jpq.pkgs_absent_sury) is none -%}
  {{- apache_empty_list -}}
  {%- else -%}
  {{- apache_pkgs | community.general.json_query(apache_jpq.pkgs_absent_sury) -}}
  {%- endif %}
apache_sury_pkg_present: >-
  {%- if apache_pkgs | community.general.json_query(apache_jpq.pkgs_present_sury) is none -%}
  {{- apache_empty_list -}}
  {%- else -%}
  {{- apache_pkgs | community.general.json_query(apache_jpq.pkgs_present_sury) -}}
  {%- endif %}

# The following lists can be generated using the sury-packages.sh script in this directory.
# To update them delete everything after this comment and inset the results of the script.
# For example delete the lines and run:
# bash ./sury-packages.sh >> main.yml

# bookworm packages
apache_pkg_bookworm:
  - apache2
  - apache2-bin
  - apache2-data
  - apache2-doc
  - apache2-suexec-custom
  - apache2-suexec-pristine
  - apache2-utils
  - brotli
  - debsuryorg-archive-keyring
  - libapache2-mod-md
  - libapache2-mod-proxy-uwsgi
  - libapr1
  - libapr1t64
  - libaprutil1
  - libaprutil1-dbd-mysql
  - libaprutil1-dbd-odbc
  - libaprutil1-dbd-pgsql
  - libaprutil1-dbd-sqlite3
  - libaprutil1-ldap
  - libaprutil1t64
  - libbrotli1
  - python3-brotli

# noble packages
apache_pkg_noble:
  - apache2
  - apache2-bin
  - apache2-data
  - apache2-doc
  - apache2-suexec-custom
  - apache2-suexec-pristine
  - apache2-utils

# resolute packages
apache_pkg_resolute:
  - apache2
  - apache2-bin
  - apache2-data
  - apache2-doc
  - apache2-suexec-custom
  - apache2-suexec-pristine
  - apache2-utils

# trixie packages
apache_pkg_trixie:
  - apache2
  - apache2-bin
  - apache2-data
  - apache2-doc
  - apache2-suexec-custom
  - apache2-suexec-pristine
  - apache2-utils
  - debsuryorg-archive-keyring
  - libapr1
  - libapr1t64
  - libaprutil1-dbd-mysql
  - libaprutil1-dbd-odbc
  - libaprutil1-dbd-pgsql
  - libaprutil1-dbd-sqlite3
  - libaprutil1-ldap
  - libaprutil1t64
